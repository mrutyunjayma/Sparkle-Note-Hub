name: Sparkle Note Production CI-CD

on:
  pull_request:
  push:
    branches: [ main ]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  BACKEND_REPO: ${{ secrets.ECR_REPOSITORY_BACKEND }}
  FRONTEND_REPO: ${{ secrets.ECR_REPOSITORY_FRONTEND }}

jobs:

  # 🔹 1. Test Stage
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Run Tests
        run: pnpm test


  # 🔹 2. FS Security Scan
  fs-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true


  # 🔹 3. Build Images
  build:
    runs-on: ubuntu-latest
    needs: fs-scan

    outputs:
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate Image Tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Backend Image
        run: |
          docker build \
          -t backend:${{ steps.meta.outputs.tag }} \
          -f artifacts/api-server/Dockerfile .

      - name: Build Frontend Image
        run: |
          docker build \
          -t frontend:${{ steps.meta.outputs.tag }} \
          -f artifacts/sparkle-note-hub/Dockerfile .


  # 🔹 4. Image Security Scan
  image-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: backend:${{ needs.build.outputs.tag }}
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: frontend:${{ needs.build.outputs.tag }}
          severity: HIGH,CRITICAL
          exit-code: 1


  # 🔹 5. Push to AWS ECR
  push:
    runs-on: ubuntu-latest
    needs: image-scan

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Backend Image
        run: |
          docker tag backend:${{ needs.build.outputs.tag }} $BACKEND_REPO:${{ needs.build.outputs.tag }}
          docker push $BACKEND_REPO:${{ needs.build.outputs.tag }}

      - name: Push Frontend Image
        run: |
          docker tag frontend:${{ needs.build.outputs.tag }} $FRONTEND_REPO:${{ needs.build.outputs.tag }}
          docker push $FRONTEND_REPO:${{ needs.build.outputs.tag }}


  # 🔹 6. GitOps Update (ArgoCD)
  gitops:
    runs-on: ubuntu-latest
    needs: push

    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: your-username/sparkle-note-gitops
          token: ${{ secrets.GH_PAT }}
          path: gitops

      - name: Update Kubernetes Manifests
        run: |
          TAG=${{ needs.build.outputs.tag }}
          cd gitops

          sed -i "s|image:.*backend.*|image: $BACKEND_REPO:$TAG|" apps/backend/deployment.yaml
          sed -i "s|image:.*frontend.*|image: $FRONTEND_REPO:$TAG|" apps/frontend/deployment.yaml

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "Update images to $TAG" || echo "No changes"
          git push


  # 🔹 7. Slack Notification
  notify:
    runs-on: ubuntu-latest
    needs: [test, fs-scan, build, image-scan, push, gitops]
    if: always()

    steps:
      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🚀 Sparkle Note Pipeline: ${{ job.status }} (Commit: ${{ github.sha }})"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}