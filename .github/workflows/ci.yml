name: Sparkle Note CI

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # with:
        #   version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      # - name: Run Tests
      #   run: pnpm test

  fs-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  notify:
    runs-on: ubuntu-latest
    needs: [test, fs-scan]
    if: always()
    steps:
      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
            "text": "🚀 *Sparkle Note CI Pipeline*\n
            • Image Scan: ${{ needs.image-scan.result }}\n
            • Branch: ${{ github.ref_name }}\n
            • Commit: ${{ github.sha }}\n
            • Run Number: #${{ github.run_number }}\n
            • Actor: ${{ github.actor }}\n
            • Workflow Run:\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}